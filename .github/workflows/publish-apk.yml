name: Android validation

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-validation-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
          show-progress: false
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a
        with:
          gradle-version: '8.10.2'
      - name: Install Android SDK components
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install "platforms;android-35" "build-tools;35.0.0" > /dev/null
      - name: Assemble local-development debug APK
        run: gradle --no-daemon assembleDebug
      - name: Run unit tests
        run: gradle --no-daemon test
      - name: Assert release authority is absent
        shell: bash
        run: |
          set -euo pipefail
          ! grep -R --line-number -E 'contents:[[:space:]]*write|gh release (create|upload|edit)|git push --force|continuous-apk|android-release-verified' .github/workflows
          test ! -e keystore/debug.keystore || {
            echo 'shared debug private key remains in the current tree' >&2
            exit 1
          }

# Debug APKs are intentionally not uploaded or published. The former shared
# debug signing identity is public and revoked. Only separately produced,
# offline release-signed candidates may later enter a governed release path.
